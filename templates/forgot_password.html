<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — ScholarPulse</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body style="margin:0; padding:0; background:#fafaf9; min-height:100vh; display:block;">

<div class="login-center-page">
    <div class="login-center-card">
        
        <!-- Header / Branding -->
        <div class="login-center-brand">
            <div class="login-center-logo">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
                </svg>
            </div>
            <span class="login-center-brand-name">ScholarPulse</span>
        </div>
        
        <div class="login-center-header">
            <h2>Reset Password</h2>
            <p>Verify your details to update your secure password.</p>
        </div>
        
        <!-- Flash Alert Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
                <div class="{% if category == 'success' %}flash-human{% else %}flash-human{% endif %}" 
                     style="{% if category == 'success' %}background:#f0fdfa; border-color:#bbf7d0; color:#0f766e;{% endif %} margin-bottom: 20px;">
                    {{ message }}
                </div>
            {% endfor %}
          {% endif %}
        {% endwith %}
        
        <!-- Form -->
        <form method="POST" action="/forgot_password">
            
            <!-- Segmented Role Selector -->
            <div class="human-tabs">
                <input type="radio" name="role" id="r_student" value="student" checked>
                <label for="r_student">Student</label>
    
                <input type="radio" name="role" id="r_teacher" value="teacher">
                <label for="r_teacher">Mentor</label>
    
                <input type="radio" name="role" id="r_parent" value="parent">
                <label for="r_parent">Parent</label>
            </div>
    
            <!-- Form Inputs -->
            <div class="human-group">
                <label id="usn-label">Student USN</label>
                <div class="human-input-wrapper">
                    <input type="text" name="id_num" id="username-input" class="human-input" placeholder="e.g. NNM23RI031" required autocomplete="off">
                </div>
            </div>

            <div class="human-group">
                <label>Full Name</label>
                <div class="human-input-wrapper">
                    <input type="text" name="name" class="human-input" placeholder="Enter your full name" required autocomplete="off">
                </div>
            </div>
    
            <div class="human-group" style="margin-bottom: 24px;">
                <label>New Password</label>
                <div class="human-input-wrapper">
                    <input type="password" name="new_password" class="human-input" placeholder="Enter new password" required>
                </div>
            </div>
    
            <button type="submit" class="btn-human">Reset Password</button>
        </form>
        
        <!-- Footer Actions -->
        <div class="human-footer" style="justify-content: center; margin-top: 24px;">
            <a href="/login" class="human-link">← Back to Login Portal</a>
        </div>
        
    </div>
</div>

<script>
    const labels = {
        r_student: 'Student USN',
        r_teacher: 'Mentor ID',
        r_parent: 'Parent ID'
    };
    
    const placeholders = {
        r_student: 'e.g. NNM23RI031',
        r_teacher: 'e.g. T-102',
        r_parent: 'e.g. P-NNM23RI031'
    };

    document.querySelectorAll('.human-tabs input').forEach(radio => {
        radio.addEventListener('change', () => {
            document.getElementById('usn-label').textContent = labels[radio.id] || 'ID Number';
            document.getElementById('username-input').placeholder = placeholders[radio.id] || 'Enter your ID';
        });
    });
</script>

</body>
</html>
