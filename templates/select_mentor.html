<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Mentor — ScholarPulse</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body style="align-items: center; justify-content: center; min-height: 100vh;">

<div class="glass-container" style="max-width:480px; text-align: center; margin: auto;">
    <div style="font-size:3rem; margin-bottom:16px;"></div>
    <h2 style="margin:0 0 12px; font-size: 1.8rem; font-weight: 600;">Choose Your Mentor</h2>
    <p style="color:var(--text-secondary); font-size:0.95rem; margin:0 0 32px 0;">
        Your mentor will guide you and provide personalized support throughout your journey.
    </p>

    <form method="POST" action="/student/select_mentor" style="text-align:left;">
        <div class="form-group" style="margin-bottom:32px;">
            <label>Select Faculty Mentor</label>
            <select name="mentor_id" required>
                <option value="" disabled selected>— Choose from list —</option>
                {% for t in teachers %}
                <option value="{{ t.teacher_id }}">{{ t.name }} — {{ t.department }}</option>
                {% endfor %}
            </select>
        </div>

        <button type="submit" class="btn" style="width:100%; padding:16px; margin-bottom: 12px;">Confirm </button>
        <a href="/logout" class="btn secondary" style="width:100%; display:block;">Logout</a>
    </form>
</div>

</body>
</html>
