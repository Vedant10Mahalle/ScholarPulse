<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Onboarding — ScholarPulse</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body style="margin:0; padding:0; background:#fafaf9; min-height:100vh; display:block;">

<div class="login-center-page" style="padding: 40px 20px; align-items: flex-start;">
    <div class="login-center-card" style="max-width: 520px; padding: 40px 36px; margin: auto;">
        
        <!-- Header / Branding -->
        <div class="login-center-brand">
            <div class="login-center-logo">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
                </svg>
            </div>
            <span class="login-center-brand-name">ScholarPulse</span>
        </div>
        
        <div class="login-center-header">
            <h2>Student Onboarding</h2>
            <p>Register your profile into the institutional tracking database.</p>
        </div>

        <!-- Flash Alert Messages -->
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="flash-human" style="margin-bottom: 20px;">
                {{ messages[0] }}
            </div>
          {% endif %}
        {% endwith %}

        <form method="POST" action="/register" style="text-align: left;">
            <div class="human-group">
                <label>University ID (USN)</label>
                <div class="human-input-wrapper">
                    <input type="text" name="usn" class="human-input" placeholder="e.g. NNM23RI031" required>
                </div>
            </div>

            <div class="human-group" style="margin-bottom: 28px;">
                <label>Set Secure Password</label>
                <div class="human-input-wrapper">
                    <input type="password" name="password" class="human-input" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn-human">Complete Onboarding</button>
        </form>
        
        <!-- Footer Actions -->
        <div class="human-footer" style="justify-content: center; margin-top: 24px;">
            <a href="/login" class="human-link">← Back to Login Portal</a>
        </div>
        
    </div>
</div>

</body>
</html>
