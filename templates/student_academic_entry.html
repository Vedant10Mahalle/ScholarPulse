<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Academic Self-Report (Dynamic Semesters)</title>
    <link href="https://fonts.googleapis.com/css2family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .mark-row { display: grid; grid-template-columns: 2fr 1fr 1fr auto; gap: 15px; margin-bottom: 15px; align-items: center; }
        .mark-row input { margin: 0; }
        .del-btn { background: rgba(239, 68, 68, 0.2); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); padding: 8px 12px; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body style="padding: 40px 0;">

<div class="glass-container large" style="max-width: 900px;">
    <h2 style="margin: 0 0 10px 0; font-family: 'Outfit', sans-serif;">Academic Self-Report Entry</h2>
    <p style="color: var(--text-secondary); font-size: 0.95rem; margin-bottom: 30px;">Choose a semester and declare all subjects dynamically. (Supports up to Sem 8)</p>

    <form method="POST" action="/student/academic_entry" style="text-align: left;">
        
        <div class="form-group" style="margin-bottom: 25px;">
            <label>Select Semester</label>
            <select name="semester" required>
                <!-- Generating Sem 1 to 8 -->
                <option value="1">Semester 1</option><option value="2">Semester 2</option>
                <option value="3">Semester 3</option><option value="4" selected>Semester 4</option>
                <option value="5">Semester 5</option><option value="6">Semester 6</option>
                <option value="7">Semester 7</option><option value="8">Semester 8</option>
            </select>
        </div>

        <h3 class="section-header" style="display: flex; justify-content: space-between; align-items: center;">
            Subject Marks
            <button type="button" class="btn secondary" style="margin:0; padding: 6px 12px; font-size: 0.85rem;" onclick="addSubjectRow()">+ Add Subject</button>
        </h3>
        
        <div style="margin-bottom: 25px;">
            <div class="mark-row" style="color: var(--text-muted); font-size: 0.85rem; padding-bottom: 10px; border-bottom: 1px solid var(--border-light);">
                <div>Subject Name</div><div>CIE (Out of 50)</div><div>SEE (Out of 100)</div><div>Action</div>
            </div>
            
            <div id="subjectsContainer">
                <div class="mark-row">
                    <input type="text" name="subject_name[]" placeholder="e.g. Data Structures" required>
                    <input type="number" step="0.1" name="cie[]" placeholder="CIE" required>
                    <input type="number" step="0.1" name="see[]" placeholder="SEE" required>
                    <div>&nbsp;</div>
                </div>
            </div>
        </div>

        <h3 class="section-header">Performance Aggregate</h3>
        <div class="form-grid">
            <div class="form-group"><label>Total Attendance (%)</label><input type="number" step="0.1" name="attendance" required></div>
            <div class="form-group"><label>Total Activity Points (Max 50)</label><input type="number" step="1" name="activity_points" required></div>
            <div class="form-group"><label>Current SGPA</label><input type="number" step="0.01" name="sgpa" required></div>
            <div class="form-group"><label>Overall CGPA</label><input type="number" step="0.01" name="cgpa" required></div>
        </div>

        <div style="text-align: right; margin-top: 30px;">
            <a href="/student" class="btn secondary" style="margin-right: 15px;">Cancel</a>
            <button type="submit" class="btn">Push Academic Data</button>
        </div>
    </form>
</div>

<script>
function addSubjectRow() {
    const container = document.getElementById('subjectsContainer');
    const row = document.createElement('div');
    row.className = 'mark-row';
    row.innerHTML = `
        <input type="text" name="subject_name[]" placeholder="e.g. Algorithms" required>
        <input type="number" step="0.1" name="cie[]" placeholder="CIE" required>
        <input type="number" step="0.1" name="see[]" placeholder="SEE" required>
        <button type="button" class="del-btn" onclick="this.parentElement.remove()">Drop</button>
    `;
    container.appendChild(row);
}
</script>

</body>
</html>
